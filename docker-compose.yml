services:
  mongo:
    build:
      context: .
      dockerfile: docker/mongo/Dockerfile
    image: tokokino-mongo:7-rs
    container_name: tokokino-mongo
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /etc/mongo-keyfile
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: tokokino
      MONGO_INITDB_ROOT_PASSWORD: tokokino
      MONGO_INITDB_DATABASE: tokokino
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD"
        --authenticationDatabase admin
        --eval 'try { rs.status().ok } catch (err) { rs.initiate({_id:"rs0",members:[{_id:0,host:"localhost:27017"}]}).ok }'
        | grep 1
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mongo-data:
